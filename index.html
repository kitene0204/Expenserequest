<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>м—җл“ҖнҢҢмқё н’Ҳмқҳ мһҗлҸҷнҷ” лҸ„мҡ°лҜё</title>
    
    <!-- Tailwind CSS (мҠӨнғҖмқјл§Ғ м Ғмҡ©мқ„ мң„н•ҙ н•„мҡ”) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React кҙҖл Ё лқјмқҙлёҢлҹ¬лҰ¬ (React мӢӨн–үмқ„ мң„н•ҙ н•„мҡ”) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (лёҢлқјмҡ°м Җк°Җ JSX л¬ёлІ•мқ„ мқҙн•ҙн•ҳлҸ„лЎқ ліҖнҷҳн•ҙмЈјлҠ” лҸ„кө¬) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SheetJS (м—‘м…Җ нҢҢмқј мІҳлҰ¬) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @keyframes fade-in-down {
            0% {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .animate-fade-in-down {
            animation: fade-in-down 0.3s ease-out forwards;
        }
        /* м¶”к°Җм Ғмқё нҸ°нҠё м„Өм • (м„ нғқмӮ¬н•ӯ) */
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
    </style>
</head>
<body>
    <!-- React м•ұмқҙ н‘ңмӢңлҗ  л№Ҳ кіөк°„ -->
    <div id="root"></div>

    <!-- м—¬кё°м„ңл¶Җн„° мӢӨм ң н”„лЎңк·ёлһЁ мҪ”л“ңмһ…лӢҲлӢӨ -->
    <script type="text/babel">
        // лёҢлқјмҡ°м Җ нҷҳкІҪм—җ л§һкІҢ React кё°лҠҘ л¶Ҳлҹ¬мҳӨкё° (import лҢҖмӢ  мӮ¬мҡ©)
        const { useState, useEffect, useRef } = React;

        // --- мң нӢёлҰ¬нӢ° л°Ҹ м•„мқҙмҪҳ м»ҙнҸ¬л„ҢнҠё ---
        const UploadIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>);
        const CopyIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>);
        const DownloadIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>);
        const TrashIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>);
        const PlusIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>);
        const RefreshIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);

        // мҲ«мһҗлҘј н•ңкёҖ кёҲм•ЎмңјлЎң ліҖнҷҳн•ҳлҠ” н•ЁмҲҳ
        function numberToKorean(number) {
            if (!number || number === 0) return 'мҳҒ';
            const numStr = String(number).replace(/,/g, '');
            if (isNaN(numStr)) return '';

            const hanA = ["", "мқј", "мқҙ", "мӮј", "мӮ¬", "мҳӨ", "мңЎ", "м№ ", "нҢ”", "кө¬"];
            const danA = ["", "мӢӯ", "л°ұ", "мІң"];
            const danG = ["", "л§Ң", "м–ө", "мЎ°"];
            let result = "";

            for (let i = 0; i < numStr.length; i++) {
                let str = "";
                let digit = parseInt(numStr[i], 10);
                if (digit > 0) {
                    str += hanA[digit];
                    str += danA[(numStr.length - (i + 1)) % 4];
                }
                
                if ((numStr.length - (i + 1)) % 4 === 0) {
                    let chunk = numStr.substring(Math.max(0, i - 3), i + 1);
                    if(parseInt(chunk) > 0) {
                       str += danG[Math.floor((numStr.length - (i + 1)) / 4)];
                    }
                }
                result += str;
            }
            
            result = result.replace(/мқјмӢӯ/g, "мӢӯ").replace(/мқјл°ұ/g, "л°ұ").replace(/мқјмІң/g, "мІң");
            return result;
        }

        // л©”мқё м•ұ м»ҙнҸ¬л„ҢнҠё
        function App() {
            const [rawText, setRawText] = useState("");
            const [items, setItems] = useState([
                { id: '1', name: '', spec: '', unit: 'к°ң', qty: 1, price: 0 }
            ]);
            const [draftText, setDraftText] = useState("");
            const [toastMsg, setToastMsg] = useState("");
            const fileInputRef = useRef(null);

            const showMessage = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(""), 3000);
            };

            // HTML мғҒлӢЁм—җм„ң мқҙлҜё л¶Ҳлҹ¬мҳӨкё° л•Ңл¬ём—җ кё°мЎҙмқҳ лҸҷм Ғ лЎңл“ң useEffectлҠ” м ңкұ°н–ҲмҠөлӢҲлӢӨ.

            useEffect(() => {
                const totalAmt = items.reduce((sum, item) => sum + ((Number(item.qty)||0) * (Number(item.price)||0)), 0);
                const korAmt = numberToKorean(totalAmt);
                
                const validItems = items.filter(i => i.name && i.name.trim() !== '');
                let itemName = "";
                
                if (validItems.length > 1) {
                    itemName = `${validItems[0].name} мҷё ${validItems.length - 1}мў…`;
                } else if (validItems.length === 1) {
                    itemName = validItems[0].name;
                } else {
                    itemName = "н’ҲлӘ©лӘ…мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”";
                }

                const newDraft = `1. н’Ҳмқҳ к°ңмҡ”(мҙҲм•Ҳ)
2. кҙҖл Ё: в—Ӣв—Ӣкіј-в—Ӣв—Ӣнҳё(2026.00.00.)
3. көҗмӢӨ л°Ҹ нҠ№лі„мӢӨ м „мӮ°нҷҳкІҪ мҡҙмҳҒмқ„ мң„н•ң м „мӮ°мҶҢлӘЁн’Ҳмқ„ м•„лһҳмҷҖ к°ҷмқҙ кө¬мһ…н•ҳкі мһҗ н•©лӢҲлӢӨ.
4. н’ҲлӘ©: ${itemName}
5. кёҲм•Ў: кёҲ${totalAmt.toLocaleString()}мӣҗ(кёҲ${korAmt}мӣҗм •)

л¶ҷмһ„ м§Җм¶ңн’Ҳмқҳм„ң 1л¶Җ. лҒқ.`;
                
                setDraftText(newDraft);
            }, [items]);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!window.XLSX) {
                    showMessage("м—‘м…Җ мІҳлҰ¬ кё°лҠҘмқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const wb = window.XLSX.read(data, { type: 'array' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        
                        const txt = window.XLSX.utils.sheet_to_txt(ws); 
                        
                        setRawText((prev) => prev ? prev + '\n\n' + txt : txt);
                        showMessage("нҢҢмқјмқ„ м„ұкіөм ҒмңјлЎң л¶Ҳлҹ¬мҷ”мҠөлӢҲлӢӨ.");
                        
                        e.target.value = '';
                        
                    } catch (error) {
                        console.error("нҢҢмқј нҢҢмӢұ м—җлҹ¬:", error);
                        showMessage("нҢҢмқјмқ„ мқҪлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ. м •мғҒм Ғмқё м—‘м…Җ нҢҢмқјмқём§Җ нҷ•мқён•ҙмЈјм„ёмҡ”.");
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const handleParse = () => {
                if (!rawText.trim()) {
                    showMessage("ліҖнҷҳн•  н…ҚмҠӨнҠёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.");
                    return;
                }
                
                const lines = rawText.split('\n').map(l => l.trim()).filter(l => l);
                const newItems = [];
                
                lines.forEach(line => {
                    if (line.includes('мҳҲмғҒлӢЁк°Җ') || line.includes('мҲҳлҹү') || line.match(/^лӮҙмҡ©\s+к·ңкІ©/)) return;

                    let tokens = line.split('\t');
                    if (tokens.length < 2) tokens = line.split(/\s{2,}/); 
                    
                    if (tokens.length >= 2) {
                         let name = '';
                         let spec = '';
                         let price = 0;
                         let qty = 1;
                         
                         const numbers = [];
                         const strings = [];
                         
                         tokens.forEach(t => {
                             const clean = t.replace(/,/g, '').replace(/мӣҗ$/, '').replace(/к°ң$/, '').replace(/EA$/, '').trim();
                             if (clean && !isNaN(clean) && Number(clean) > 0) {
                                 numbers.push(Number(clean));
                             } else if (t) {
                                 strings.push(t);
                             }
                         });
                         
                         numbers.sort((a,b) => a-b);
                         if (numbers.length >= 2) {
                             qty = numbers[0];
                             price = numbers[numbers.length - 1];
                         } else if (numbers.length === 1) {
                             if (numbers[0] <= 1000) qty = numbers[0]; 
                             else price = numbers[0];
                         }
                         
                         if (strings.length > 0) name = strings[0];
                         if (strings.length > 1) spec = strings[1];
                         
                         newItems.push({
                             id: Date.now().toString() + Math.random(),
                             name, spec, unit: 'к°ң', qty, price
                         });
                    }
                });

                if (newItems.length > 0) {
                    setItems(newItems);
                    showMessage("н‘ң нҳ•нғң лҚ°мқҙн„°лҘј м„ұкіөм ҒмңјлЎң ліҖнҷҳн–ҲмҠөлӢҲлӢӨ.");
                } else {
                    const regexParsed = [];
                    lines.forEach(line => {
                        const priceMatch = line.match(/(?:кёҲ\s*)?(\d{1,3}(?:,\d{3})+)(?:мӣҗ)?/);
                        const qtyMatch = line.match(/(\d{1,4})(?:к°ң|EA|ea|л°•мҠӨ|к¶Ң)/);
                        if(priceMatch) {
                            const price = parseInt(priceMatch[1].replace(/,/g, ''));
                            const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
                            const nameStr = line.replace(priceMatch[0], '').replace(qtyMatch?.[0]||'', '').trim();
                            if(nameStr && price > 0) {
                                regexParsed.push({
                                     id: Date.now().toString() + Math.random(),
                                     name: nameStr, spec: '', unit: 'к°ң', qty, price
                                });
                            }
                        }
                    });

                    if (regexParsed.length > 0) {
                         setItems(regexParsed);
                         showMessage("мқјл°ҳ н…ҚмҠӨнҠём—җм„ң мқјл¶Җ лҚ°мқҙн„°лҘј м¶”м¶ңн–ҲмҠөлӢҲлӢӨ.");
                    } else {
                        showMessage("ліҖнҷҳн•  лҚ°мқҙн„°лҘј м°ҫм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. кІ¬м Ғм„ң нҳ•нғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”.");
                    }
                }
            };

            const updateItem = (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
            };
            const removeItem = (id) => setItems(items.filter(i => i.id !== id));
            const addItem = () => setItems([...items, { id: Date.now().toString(), name: '', spec: '', unit: 'к°ң', qty: 1, price: 0 }]);
            const clearItems = () => setItems([{ id: Date.now().toString(), name: '', spec: '', unit: 'к°ң', qty: 1, price: 0 }]);

            const copyDraftToClipboard = () => {
                const textarea = document.createElement('textarea');
                textarea.value = draftText;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showMessage("кё°м•Ҳл¬ёмқҙ нҒҙлҰҪліҙл“ңм—җ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!");
                } catch (err) {
                    console.error('Failed to copy', err);
                    showMessage("ліөмӮ¬м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. м§Ғм ‘ м„ нғқн•ҳм—¬ ліөмӮ¬н•ҙмЈјм„ёмҡ”.");
                }
                document.body.removeChild(textarea);
            };

            const exportExcel = () => {
                if (!window.XLSX) {
                    showMessage("м—‘м…Җ мІҳлҰ¬ кё°лҠҘмқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.");
                    return;
                }
                
                const validItems = items.filter(i => i.name.trim() !== '');
                if(validItems.length === 0) {
                    showMessage("м—‘м…ҖлЎң лӢӨмҡҙлЎңл“ңн•  н’ҲлӘ© лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.");
                    return;
                }

                const wsData = [
                    ['лӮҙмҡ©', 'к·ңкІ©', 'лӢЁмң„', 'мҲҳлҹү', 'мҳҲмғҒлӢЁк°Җ']
                ];
                
                validItems.forEach(item => {
                    wsData.push([item.name, item.spec, item.unit, Number(item.qty), Number(item.price)]);
                });
                
                const ws = window.XLSX.utils.aoa_to_sheet(wsData);
                ws['!cols'] = [{wch: 30}, {wch: 30}, {wch: 8}, {wch: 8}, {wch: 15}];
                
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "н’ҲлӘ©лӮҙм—ӯ");
                window.XLSX.writeFile(wb, "м—җл“ҖнҢҢмқё_м—…лЎңл“ңмҡ©_н’ҲлӘ©лӮҙм—ӯ.xlsx");
                showMessage("м—‘м…Җ нҢҢмқјмқҙ лӢӨмҡҙлЎңл“ң лҗҳм—ҲмҠөлӢҲлӢӨ.");
            };

            const totalAmount = items.reduce((sum, item) => sum + ((Number(item.qty)||0) * (Number(item.price)||0)), 0);

            return (
                <div className="min-h-screen bg-slate-100 p-4 md:p-8 font-sans text-slate-800 relative">
                    {toastMsg && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-fade-in-down transition-all">
                            <span className="font-medium">{toastMsg}</span>
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto space-y-6">
                        <header className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div>
                                <h1 className="text-2xl font-bold text-blue-700">м—җл“ҖнҢҢмқё н’Ҳмқҳ мһҗлҸҷнҷ” лҸ„мҡ°лҜё</h1>
                                <p className="text-sm text-slate-500 mt-1">кІ¬м Ғм„ңлҘј м—…лЎңл“ңн•ҳкұ°лӮҳ н…ҚмҠӨнҠёлҘј л¶ҷм—¬л„Јм–ҙ м—‘м…Җкіј кё°м•Ҳл¬ёмқ„ мүҪкІҢ л§Ңл“ңм„ёмҡ”.</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-4 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-slate-50 p-4 border-b border-slate-200 flex flex-col gap-3">
                                    <div className="flex justify-between items-center">
                                        <h2 className="font-bold text-slate-700">кІ¬м Ғм„ң мһ…л Ҙ</h2>
                                        <button 
                                            onClick={handleParse}
                                            className="flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition-colors shadow-sm">
                                            <RefreshIcon /> ліҖнҷҳн•ҳкё°
                                        </button>
                                    </div>
                                    <div className="flex gap-2">
                                        <input 
                                            type="file" 
                                            accept=".xlsx, .xls, .csv" 
                                            className="hidden" 
                                            ref={fileInputRef}
                                            onChange={handleFileUpload}
                                        />
                                        <button 
                                            onClick={() => fileInputRef.current.click()}
                                            className="flex-1 flex items-center justify-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium px-3 py-2.5 rounded-lg transition-colors border border-slate-300">
                                            <UploadIcon /> м—‘м…Җ нҢҢмқј(.xlsx) л¶Ҳлҹ¬мҳӨкё°
                                        </button>
                                    </div>
                                </div>
                                <div className="p-4 flex-grow flex flex-col">
                                    <textarea 
                                        className="w-full h-full min-h-[300px] lg:min-h-[430px] p-3 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-all placeholder:text-slate-400 leading-relaxed"
                                        placeholder="[л°©лІ• 1] мғҒлӢЁмқҳ лІ„нҠјмңјлЎң м—‘м…Җ(.xlsx, .csv) кІ¬м Ғм„ң нҢҢмқјмқ„ м—…лЎңл“ңн•ҳм„ёмҡ”.&#13;&#10;&#13;&#10;[л°©лІ• 2] PDF нҢҢмқјмқҙлӮҳ мҮјн•‘лӘ° мһҘл°”кө¬лӢҲ нҷ”л©ҙмқҖ н‘ң лӮҙмҡ©мқ„ л§Ҳмҡ°мҠӨлЎң л“ңлһҳк·ё ліөмӮ¬(Ctrl+C)н•ҳм—¬ мқҙкіім—җ л¶ҷм—¬л„Јкё°(Ctrl+V) н•ҳм„ёмҡ”."
                                        value={rawText}
                                        onChange={(e) => setRawText(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className="lg:col-span-8 flex flex-col gap-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[400px]">
                                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                                        <h2 className="font-bold text-slate-700">м¶”м¶ңлҗң н’ҲлӘ© лҚ°мқҙн„° (мҲҳм • к°ҖлҠҘ)</h2>
                                        <div className="flex gap-2">
                                            <button onClick={clearItems} className="text-sm text-slate-500 hover:text-slate-700 px-2 py-1 transition-colors">мҙҲкё°нҷ”</button>
                                            <button onClick={addItem} className="flex items-center gap-1 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors">

                                    <div className="overflow-x-auto flex-grow">

                                                    <th className="px-4 py-3 font-medium min-w-[150px]">к·ңкІ©(мғҒм„ё)</th>

                                                    <th className="px-4 py-3 font-medium w-28 text-right">мҳҲмғҒлӢЁк°Җ</th>
                                                    <th className="px-4 py-3 font-medium w-28 text-right">кёҲм•Ў</th>
                                                    <th className="px-4 py-3 font-medium w-12 text-center">мӮӯм ң</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {items.map((item) => (
                                                    <tr key={item.id} className="hover:bg-blue-50/50 transition-colors group">
                                                        <td className="px-2 py-1">
                                                            <input className="w-full bg-transparent px-2 py-1.5 focus:bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 rounded transition-colors"

                                                        </td>
                                                        <td className="px-2 py-1">
                                                            <input className="w-full bg-transparent px-2 py-1.5 focus:bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 rounded transition-colors"

                                                        </td>
                                                        <td className="px-2 py-1">
                                                            <input className="w-full text-center bg-transparent px-1 py-1.5 focus:bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 rounded transition-colors" 
                                                                   value={item.unit} onChange={(e) => updateItem(item.id, 'unit', e.target.value)} />
                                                        </td>
                                                        <td className="px-2 py-1">
                                                            <input type="number" min="1" className="w-full text-center bg-transparent px-1 py-1.5 focus:bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 rounded transition-colors" 
                                                                   value={item.qty} onChange={(e) => updateItem(item.id, 'qty', e.target.value)} />

                                                        <td className="px-2 py-1">
                                                            <input type="number" step="100" className="w-full text-right bg-transparent px-2 py-1.5 focus:bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 rounded transition-colors" 
                                                                   value={item.price} onChange={(e) => updateItem(item.id, 'price', e.target.value)} />
                                                        </td>
                                                        <td className="px-4 py-2 text-right font-medium text-slate-600 bg-slate-50/30">
                                                            {((Number(item.qty)||0) * (Number(item.price)||0)).toLocaleString()}

                                                            <button onClick={() => removeItem(item.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded transition-all opacity-50 group-hover:opacity-100">

                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}

                                                    <tr><td colSpan="7" className="text-center py-10 text-slate-400">н’ҲлӘ© лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ. м¶”к°Җн•ҳкұ°лӮҳ н…ҚмҠӨнҠёлҘј ліҖнҷҳн•ҳм„ёмҡ”.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center">

                                        </div>
                                        <button onClick={exportExcel} className="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-medium px-5 py-2.5 rounded-xl shadow-sm transition-all active:scale-95">
                                            <DownloadIcon /> м—‘м…Җ лӢӨмҡҙлЎңл“ң

                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                                        <h2 className="font-bold text-slate-700">кё°м•Ҳл¬ё мҙҲм•Ҳ (мһҗлҸҷмғқм„ұ)</h2>
                                        <button 
                                            onClick={copyDraftToClipboard} 
                                            className="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-medium px-4 py-2 rounded-xl transition-all active:scale-95 shadow-sm">
                                            <CopyIcon /> ліөмӮ¬н•ҳкё°
                                        </button>
                                    </div>
                                    <div className="p-4">
                                        <textarea 
                                            className="w-full min-h-[220px] p-4 text-base font-medium leading-relaxed bg-blue-50/40 border border-blue-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-all"
                                            value={draftText}
                                            onChange={(e) => setDraftText(e.target.value)}
                                        />
                                        <p className="text-xs text-slate-400 mt-2 ml-1">* мғқм„ұлҗң н…ҚмҠӨнҠёлҘј м§Ғм ‘ мҲҳм • нӣ„ ліөмӮ¬н•  мҲҳ мһҲмҠөлӢҲлӢӨ. (н‘ң лӮҙмҡ©мқ„ л°”кҫёл©ҙ мҙҲкё°нҷ”лҗ©лӢҲлӢӨ)</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // React м•ұмқ„ лёҢлқјмҡ°м Җм—җ л ҢлҚ”л§Ғн•ҳлҠ” л¶Җл¶„
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
